name: cron

on:
  push:
    branches:
      - master
  schedule:
    - cron: "25 1 * * *"

# Ensure the GitHub token has permission to push the updated README
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🍽️ Get working copy
        uses: actions/checkout@v4
        with:
          fetch-depth: 1                                                                 
      
      - name: 🐍 Set up Python 3.12                               
        uses: actions/setup-python@v5                             
        with:                                 
          python-version: '3.12' 
                                                            
      - name: 💿 Install requirements                           
        run: pip install feedparser pytz emoji
        
      - name: 🍳 Update README
        run: |
          cd ${GITHUB_WORKSPACE}/src/
          python readme.py
          
      - name: 🚀 Deploy
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          # Removed the ../ since this step runs in the root directory!
          git add README.md
          # Only commit and push if there are actually changes to avoid failing the workflow
          git diff-index --quiet HEAD || git commit -m "feat(auto generate): Updated content"
          git push origin master